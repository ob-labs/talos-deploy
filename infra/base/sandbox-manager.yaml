apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-manager
  namespace: system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox-manager
  template:
    metadata:
      labels:
        app: sandbox-manager
    spec:
      serviceAccountName: sandbox-manager
      containers:
        - name: sandbox-manager
          image: sandbox-manager:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: SANDBOX_MODE
              value: "k8s"
            - name: SANDBOX_NAMESPACE
              value: "sandbox-workspaces"
            - name: PORT
              value: "8081"
---
apiVersion: v1
kind: Service
metadata:
  name: sandbox-manager
  namespace: system
spec:
  selector:
    app: sandbox-manager
  ports:
    - port: 8081
      targetPort: 8081
