name: Build, Push and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (e.g. v1.2.3)"
        required: false
        default: "latest"

env:
  REGISTRY: ${{ vars.REGISTRY }}
  IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY }}
          username: ${{ vars.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push images
        run: |
          # Workspace
          docker buildx build --platform linux/amd64 --push \
            -t $REGISTRY/claude-workspace:$IMAGE_TAG \
            ./images/workspace

          # Portal
          docker buildx build --platform linux/amd64 --push \
            -t $REGISTRY/talos-portal:$IMAGE_TAG \
            ./server

          # Sandbox Manager
          docker buildx build --platform linux/amd64 --push \
            -t $REGISTRY/sandbox-manager:$IMAGE_TAG \
            ./sandbox-manager

  deploy:
    needs: build
    runs-on: [self-hosted, ecs]
    environment: production
    env:
      REGISTRY: ${{ vars.REGISTRY }}
      IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}
      KUBECONFIG: /etc/rancher/k3s/k3s.yaml
    steps:
      - uses: actions/checkout@v4

      - name: Sync runtime secrets
        env:
          UPSTREAM_API_KEY: ${{ secrets.UPSTREAM_API_KEY }}
        run: |
          if [ -n "$UPSTREAM_API_KEY" ]; then
            JWT=$(k3s kubectl get secret talos-portal-secrets -n system \
              -o jsonpath='{.data.jwt-secret}' | base64 -d)
            k3s kubectl create secret generic talos-portal-secrets \
              --from-literal=jwt-secret="$JWT" \
              --from-literal=upstream-api-key="$UPSTREAM_API_KEY" \
              --namespace system --dry-run=client -o yaml | k3s kubectl apply -f -
          fi

      - name: Deploy to k3s
        run: bash scripts/deploy-remote.sh
